trial_count: 96
candidate_count: 5
tpe_seed: 17
drawdown_floor: "1"
minimum_trade_count:
  in_sample: 12
  out_of_sample: 4
robustness:
  neighbor_count: 0
  step_scale: "1"
walk_forward:
  train_window_days: 60
  oos_window_days: 20
  step_days: 20
# Session-boundary micro-offsets were pruned (M5): six low-prior dimensions that
# invited overfitting. Session windows stay at their configured defaults.
search_space:
  sweep_buffer_pips:
    type: decimal
    min: "0.5"
    max: "3.0"
    step: "0.5"
  fvg_window:
    type: int
    min: 1
    max: 20
    step: 1
  swing_lookback:
    type: int
    min: 1
    max: 20
    step: 1
  rr_floor:
    type: decimal
    min: "1.0"
    max: "4.0"
    step: "0.5"
  liquidity_rr_floor:
    type: decimal
    min: "1.0"
    max: "2.0"
    step: "0.5"
  target_mode:
    type: categorical
    choices:
      - rr_or_liquidity
      - rr
      - opposite_session
  require_mss:
    type: categorical
    choices:
      - false
      - true
  require_volume_spike:
    type: categorical
    choices:
      - false
      - true
  exit_mode:
    type: categorical
    choices:
      - bracket
      - atr_trail
      - time_stop
  max_spread_pips:
    type: decimal
    min: "0.5"
    max: "3.0"
    step: "0.1"
  max_trades_per_day:
    type: int
    min: 1
    max: 4
    step: 1
