services:
  backend:
    image: ghcr.io/chris-arsenault/harbor/backend:${IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      ALLOW_LIVE: "false"
      DB_HOST: "192.168.66.3"
      DB_NAME: "${DB_NAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_PORT: "5432"
      DB_USER: "${DB_USER}"
      HARBOR_AUTH_CLIENT_ID: "${HARBOR_AUTH_CLIENT_ID}"
      HARBOR_AUTH_ISSUER_URL: "${HARBOR_AUTH_ISSUER_URL}"
      HARBOR_AUTH_REQUIRED: "true"
      HARBOR_GIT_SHA: "${IMAGE_TAG:-unknown}"
      HARBOR_LIVE_INGEST_ENABLED: "true"
      OANDA_ACCOUNT_ID: "${OANDA_ACCOUNT_ID}"
      OANDA_API_KEY: "${OANDA_API_KEY}"
      OANDA_API_TOKEN: "${OANDA_API_TOKEN}"
      OANDA_BOOK_POLL_INTERVAL_SECONDS: "300"
      OANDA_BOOK_RECORDER_ENABLED: "true"
      OANDA_ENV: "practice"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/ready', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  frontend:
    image: ghcr.io/chris-arsenault/harbor/frontend:${IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "192.168.66.3:30091:80"
    environment:
      HARBOR_AUTH_REQUIRED: "true"
      HARBOR_AUTH_CLIENT_ID: "${HARBOR_AUTH_CLIENT_ID}"
      HARBOR_AUTH_ISSUER_URL: "${HARBOR_AUTH_ISSUER_URL}"
      HARBOR_COGNITO_CLIENT_ID: "${HARBOR_COGNITO_CLIENT_ID}"
      HARBOR_COGNITO_USER_POOL_ID: "${HARBOR_COGNITO_USER_POOL_ID}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 15s
